name: ci-cd

on:
  pull_request:
  push:
    branches: ["main", "master"]
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migrate database
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local Docker images
        run: docker compose build

  publish:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Normalize image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${{ env.IMAGE_OWNER }}/strannik-web" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    if: github.event_name == 'push'
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.YC_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.YC_PORT }}" "${{ secrets.YC_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Yandex Cloud VM
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.YC_PORT }}" "${{ secrets.YC_USER }}@${{ secrets.YC_HOST }}" '
            cd /opt/strannik &&
            docker compose -f compose.prod.yaml pull &&
            docker compose -f compose.prod.yaml up -d --no-build &&
            docker compose -f compose.prod.yaml restart nginx &&
            docker image prune -f
          '
